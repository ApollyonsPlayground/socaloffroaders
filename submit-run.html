<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Host Trail Run | So Cal Off-Roaders</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/forms.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="logo">🚙</span>
            <span class="brand-text">So Cal Off-Roaders</span>
        </div>
        <ul class="nav-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="trails.html">Trails</a></li>
            <li><a href="beginner-guide.html">Beginner Guide</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="gear.html">Gear</a></li>
            <li><a href="submit-trail.html">Submit Trail</a></li>
        </ul>
    </nav>

    <header class="page-header">
        <div class="container">
            <h1>Host a Trail Run</h1>
            <p>Organize an event and meet fellow off-roaders</p>
        </div>
    </header>

    <section class="form-section">
        <div class="container">
            <form id="runForm" class="submission-form">
                <div class="form-group">
                    <label for="runTitle">Event Title *</label>
                    <input type="text" id="runTitle" name="runTitle" placeholder="e.g., Calico Ghost Town Adventure" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="runDate">Date *</label>
                        <input type="date" id="runDate" name="runDate" required>
                    </div>
                    <div class="form-group">
                        <label for="runTime">Time *</label>
                        <input type="time" id="runTime" name="runTime" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="trailSelect">Trail *</label>
                    <select id="trailSelect" name="trailSelect" required>
                        <option value="">Select a Trail</option>
                        <option value="1">Calico Ghost Town</option>
                        <option value="2">Johnson Valley</option>
                        <option value="3">Big Bear Alpine Trail</option>
                        <option value="4">Holcomb Creek</option>
                        <option value="5">Gold Mountain</option>
                        <option value="7">Anza-Borrego Desert</option>
                        <option value="8">Ocotillo Wells</option>
                        <option value="9">Superstition Mountain</option>
                        <option value="19">Mojave Road</option>
                        <option value="20">Afton Canyon</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="runDifficulty">Difficulty *</label>
                        <select id="runDifficulty" name="runDifficulty" required>
                            <option value="">Select Difficulty</option>
                            <option value="beginner">Beginner</option>
                            <option value="moderate">Moderate</option>
                            <option value="advanced">Advanced</option>
                            <option value="extreme">Extreme</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="maxParticipants">Max Participants</label>
                        <input type="number" id="maxParticipants" name="maxParticipants" min="2" max="50" value="10">
                    </div>
                </div>

                <div class="form-group">
                    <label for="meetingPoint">Meeting Point *</label>
                    <input type="text" id="meetingPoint" name="meetingPoint" placeholder="e.g., Calico Ghost Town entrance parking lot" required>
                </div>

                <div class="form-group">
                    <label for="runDescription">Description *</label>
                    <textarea id="runDescription" name="runDescription" rows="4" required placeholder="Describe the run, what to expect, any special notes..."></textarea>
                </div>

                <div class="form-group">
                    <label for="requirements">Requirements (one per line)</label>
                    <textarea id="requirements" name="requirements" rows="4" placeholder="e.g.,&#10;4WD vehicle&#10;33+ inch tires&#10;Recovery gear&#10;Ham radio"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="hostName">Your Name *</label>
                        <input type="text" id="hostName" name="hostName" required>
                    </div>
                    <div class="form-group">
                        <label for="hostContact">Contact (Email/IG) *</label>
                        <input type="text" id="hostContact" name="hostContact" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-large">Submit Trail Run</button>
            </form>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 So Cal Off-Roaders</p>
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('runForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Trail run submitted! Thank you for organizing. We will post it to the events page after review.');
            this.reset();
        });
    </script>
</body>
</html>
